<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <link rel="stylesheet" href="./styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Universe</title>
</head>

<body class="corpo">

    <header class="header">
        <img class="imagem" src="./assets/nexus.png" alt="">
        <h1 class="cabecalho">Nexus Universe</h1>
    </header>

    <!-- MENU -->
    <div class="menu-container">
        <div class="barra">
            <button class="botao">Início</button>
            <button class="botao">Sobre</button>
            <button class="botao">Serviços</button>
            <button class="botao">Contato</button>
        </div>
    </div>

    <!-- LOGIN CENTRALIZADO -->
    <div class="container-login">
        <form class="form">
            <h2>Acessar conta do Discord</h2>

            <input type="text" placeholder="Digite seu usuário">
            <input type="password" placeholder="Digite sua senha">

            <button class="btn-login">Acessar</button>
        </form>
    </div>

</body>

<script src="./main.js"></script>
</html>
